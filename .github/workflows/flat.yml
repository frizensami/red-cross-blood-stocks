name: Flat Data

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '*/60 * * * *'

permissions:
  contents: write

jobs:
  scheduled:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch blood stocks
        run: npm run fetch

      - name: Commit latest data
        run: |
          if git diff --quiet -- blood-stocks.json; then
            echo "No data changes"
            exit 0
          fi

          date="$(date -u +"%Y-%m-%dT%H:%M:%S.%3NZ")"
          git config user.name "flat-data"
          git config user.email "flat-data@users.noreply.github.com"
          git add blood-stocks.json
          git commit -m "Flat: latest data (${date})"
          git push
